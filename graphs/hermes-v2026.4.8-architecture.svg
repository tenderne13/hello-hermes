<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1440 1140" width="1440" height="1140">
  <style>
    text {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Helvetica Neue", Arial, "PingFang SC", "Microsoft YaHei", sans-serif;
      fill: #111827;
    }
    .title { font-size: 28px; font-weight: 600; }
    .subtitle { font-size: 14px; fill: #6b7280; }
    .lane-label { font-size: 11px; font-weight: 600; letter-spacing: 0.12em; fill: #9ca3af; }
    .node-type { font-size: 11px; font-weight: 600; letter-spacing: 0.08em; fill: #9ca3af; }
    .node-title { font-size: 15px; font-weight: 600; }
    .node-sub { font-size: 12px; fill: #4b5563; }
    .edge-label { font-size: 11px; fill: #6b7280; }
    .lane { fill: none; stroke: #e5e7eb; stroke-width: 1.2; stroke-dasharray: 5 5; }
    .node { fill: #f9fafb; stroke: #e5e7eb; stroke-width: 1.2; }
    .edge { fill: none; stroke: #3b82f6; stroke-width: 1.8; stroke-linecap: round; stroke-linejoin: round; }
    .edge-soft { fill: none; stroke: #93c5fd; stroke-width: 1.4; stroke-dasharray: 6 6; stroke-linecap: round; stroke-linejoin: round; }
  </style>
  <defs>
    <marker id="arrow-blue" markerWidth="9" markerHeight="7" refX="8" refY="3.5" orient="auto">
      <polygon points="0 0, 9 3.5, 0 7" fill="#3b82f6"/>
    </marker>
    <marker id="arrow-soft" markerWidth="9" markerHeight="7" refX="8" refY="3.5" orient="auto">
      <polygon points="0 0, 9 3.5, 0 7" fill="#93c5fd"/>
    </marker>
  </defs>

  <rect width="1440" height="1140" fill="#ffffff"/>

  <g transform="translate(56,48)">
    <text x="0" y="0" class="title">Hermes Agent v2026.4.8 Architecture</text>
    <text x="0" y="30" class="subtitle">用更干净的主链展示入口、外壳、编排、能力与持久化关系</text>
  </g>

  <g transform="translate(58,96)">
